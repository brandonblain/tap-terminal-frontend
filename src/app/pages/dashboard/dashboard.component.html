<div class="dashboard-container">
  
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h2>TAP <span>Terminal</span></h2>
    </div>
    
    <nav class="sidebar-menu">
      @if (canView('USUARIOS')) {
        <a routerLink="/dashboard/usuarios" class="nav-item">
          <i class="icon-users"></i> Usuarios
        </a>
      }
      @if (canView('PRODUCTOS')) {
        <a routerLink="/dashboard/productos" class="nav-item">
          <i class="icon-box"></i> Productos
        </a>
      }
      @if (canView('PERFILES')) {
        <a routerLink="/dashboard/perfiles" class="nav-item">
          <i class="icon-shield"></i> Perfiles
        </a>
      }
    </nav>
  </aside>

  <div class="main-content">
    
    <header class="navbar">
      <div class="user-info">
        <span class="status-indicator"></span>
        <p>Supervisor Activo</p>
      </div>
      <button class="logout-btn" (click)="onLogout()">
        Cerrar Sesión 🚪
      </button>
    </header>

    <main class="content-body">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
